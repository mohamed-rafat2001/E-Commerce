<!DOCTYPE html>
<html lang="en">
	<head>
		<script>
		  (function () {
		    const saved = localStorage.getItem('theme')
		    const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches
		    if (saved === 'dark' || (!saved && prefersDark)) {
		      document.documentElement.classList.add('dark')
		    } else {
		      document.documentElement.classList.remove('dark')
		    }
		  })()
		</script>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />

		<!-- Primary Meta Tags -->
		<title>ShopyNow — Curated Luxury Fashion, Tech & Home Essentials</title>
		<meta name="description" content="Discover curated luxury fashion, tech gadgets, and home essentials at ShopyNow. Premium products, unbeatable prices, and fast delivery." />
		<meta name="robots" content="index, follow" />
		<link rel="canonical" href="https://shopynow.com" />

		<!-- Open Graph / Facebook -->
		<meta property="og:type" content="website" />
		<meta property="og:title" content="ShopyNow — Curated Luxury Fashion, Tech & Home Essentials" />
		<meta property="og:description" content="Discover curated luxury fashion, tech gadgets, and home essentials at ShopyNow." />
		<meta property="og:image" content="https://shopynow.com/assets/images/og-default.jpg" />
		<meta property="og:image:width" content="1200" />
		<meta property="og:image:height" content="630" />
		<meta property="og:url" content="https://shopynow.com" />
		<meta property="og:site_name" content="ShopyNow" />

		<!-- Twitter Card -->
		<meta name="twitter:card" content="summary_large_image" />
		<meta name="twitter:title" content="ShopyNow — Curated Luxury Fashion, Tech & Home Essentials" />
		<meta name="twitter:description" content="Discover curated luxury fashion, tech gadgets, and home essentials at ShopyNow." />
		<meta name="twitter:image" content="https://shopynow.com/assets/images/og-default.jpg" />

		<!-- Favicon & PWA -->
		<meta name="theme-color" content="#111827" />
		<link rel="icon" type="image/svg+xml" href="/vite.svg" />
		<link rel="apple-touch-icon" href="/apple-touch-icon.png" />
		<link rel="manifest" href="/manifest.json" />

		<!-- Preconnect to critical third-party origins (eliminates DNS+TCP+TLS overhead) -->
		<link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link rel="preconnect" href="https://res.cloudinary.com" crossorigin />
		<link rel="dns-prefetch" href="https://res.cloudinary.com" />
		<link rel="dns-prefetch" href="https://images.unsplash.com" />

		<!-- Preload critical fonts with font-display: swap -->
		<link rel="preload" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" as="style" />
		<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" />

		<!-- Main CSS -->
		<link rel="stylesheet" href="./index.css" />
	</head>
	<body>
		<noscript>You need JavaScript enabled to use ShopyNow.</noscript>
		<div id="root"></div>
		<script type="module" src="/src/main.jsx"></script>
	</body>
</html>
